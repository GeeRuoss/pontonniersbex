# Garde-fou anti-fuite de secrets
# Modèle réutilisable. À copier dans .github/workflows/ de chaque nouveau repo.
# Scanne le repo à chaque push et chaque pull request.
# Bloque le merge / déclenche une alerte si un secret est détecté.
# Doc : https://github.com/gitleaks/gitleaks
name: Secrets Check

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  gitleaks:
    name: Scan gitleaks
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Récupérer le code complet (historique inclus)
        uses: actions/checkout@v4
        with:
          # fetch-depth: 0 = on récupère tout l'historique git
          # pour pouvoir scanner même les commits anciens
          fetch-depth: 0

      - name: Lancer gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          # Token GitHub pour publier les résultats dans les PR / Actions
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Si un secret est détecté, le job échoue (rouge sur GitHub)
          GITLEAKS_ENABLE_COMMENTS: true
          GITLEAKS_ENABLE_UPLOAD_ARTIFACT: true
          GITLEAKS_ENABLE_SUMMARY: true
